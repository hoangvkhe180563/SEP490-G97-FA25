services:
  backend-api:
    build:
      context: .
      dockerfile: StudyHub.Backend.Api/Dockerfile
    container_name: studyhub-api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:6789
    dns:
      - 8.8.8.8
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
    container_name: studyhub-elastic
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=123456
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: 2g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:123456 -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s      # Kiểm tra mỗi 15 giây
      timeout: 10s       # Chờ phản hồi trong 10 giây
      retries: 10        # Thử lại 10 lần (tổng cộng chờ khoảng 150s)
      start_period: 60s  # QUAN TRỌNG: Cho phép ES có 60 giây để khởi động mà không bị tính là lỗi
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

volumes:
  elastic_data: